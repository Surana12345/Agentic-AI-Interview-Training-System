# Render.com Blueprint — Backend Deployment Configuration
# This file tells Render how to build and run the backend service.

services:
  - type: web
    name: agentic-ai-coach-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: JWT_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: PYTHON_VERSION
        value: "3.11.0"
